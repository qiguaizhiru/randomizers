<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>随机动漫抽取器</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700;900&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Noto Sans SC', sans-serif;
    min-height: 100vh;
    background: #0a0a1a;
    color: #fff;
    overflow-x: hidden;
  }

  /* Animated background */
  .bg-stars {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    pointer-events: none; z-index: 0;
    background: radial-gradient(ellipse at 20% 50%, rgba(72, 15, 107, 0.3) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 20%, rgba(15, 82, 107, 0.3) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 80%, rgba(107, 15, 62, 0.2) 0%, transparent 50%);
  }
  .star {
    position: absolute; border-radius: 50%; background: #fff;
    animation: twinkle ease-in-out infinite;
  }
  @keyframes twinkle {
    0%, 100% { opacity: 0.2; transform: scale(1); }
    50% { opacity: 1; transform: scale(1.5); }
  }

  .container {
    position: relative; z-index: 1;
    max-width: 1100px; margin: 0 auto; padding: 30px 20px;
  }

  /* Header */
  .header {
    text-align: center; margin-bottom: 30px;
  }
  .header h1 {
    font-size: 2.8rem; font-weight: 900;
    background: linear-gradient(135deg, #f093fb, #f5576c, #4facfe);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text; background-size: 300% 300%;
    animation: gradShift 4s ease infinite;
  }
  @keyframes gradShift {
    0%, 100% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
  }
  .header .sub { color: #666; margin-top: 5px; font-size: 0.9rem; }
  .header .sub span { color: #f5576c; font-weight: 700; }

  /* Filters */
  .filters {
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 16px;
    padding: 20px;
    margin-bottom: 25px;
  }
  .filter-row {
    display: flex; align-items: flex-start; gap: 10px;
    margin-bottom: 10px; flex-wrap: wrap;
  }
  .filter-row:last-child { margin-bottom: 0; }
  .filter-label {
    font-size: 0.85rem; color: #888; min-width: 50px;
    padding-top: 5px; flex-shrink: 0;
  }
  .filter-options {
    display: flex; flex-wrap: wrap; gap: 6px; flex: 1;
  }
  .filter-tag {
    padding: 4px 12px; border-radius: 15px;
    font-size: 0.8rem; cursor: pointer;
    border: 1px solid rgba(255,255,255,0.1);
    background: rgba(255,255,255,0.03);
    color: #999; transition: all 0.25s;
    white-space: nowrap;
  }
  .filter-tag:hover { background: rgba(255,255,255,0.1); color: #fff; }
  .filter-tag.active {
    background: linear-gradient(135deg, #f5576c, #f093fb);
    color: #fff; border-color: transparent;
  }
  .filter-summary {
    text-align: center; padding: 8px 0 0;
    font-size: 0.85rem; color: #666;
  }
  .filter-summary span { color: #4facfe; font-weight: 700; }

  /* Action buttons */
  .actions {
    display: flex; justify-content: center; gap: 20px;
    margin-bottom: 30px; flex-wrap: wrap;
  }
  .draw-btn {
    padding: 16px 50px; font-size: 1.2rem; font-weight: 700;
    border: none; border-radius: 50px; cursor: pointer;
    color: #fff; transition: all 0.3s;
    font-family: 'Noto Sans SC', sans-serif;
    position: relative; overflow: hidden;
  }
  .draw-btn::before {
    content: ''; position: absolute; top: 0; left: -100%; width: 100%; height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
    transition: left 0.5s;
  }
  .draw-btn:hover::before { left: 100%; }
  .draw-btn:hover { transform: translateY(-3px); }
  .draw-btn:active { transform: translateY(0) scale(0.97); }
  .draw-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none !important; }

  .btn-single {
    background: linear-gradient(135deg, #f5576c, #f093fb);
    box-shadow: 0 8px 30px rgba(245, 87, 108, 0.4);
  }
  .btn-multi {
    background: linear-gradient(135deg, #4facfe, #00f2fe);
    box-shadow: 0 8px 30px rgba(79, 172, 254, 0.4);
  }

  /* Results area */
  .results {
    display: flex; flex-wrap: wrap; gap: 20px; justify-content: center;
    min-height: 200px;
  }

  .result-placeholder {
    text-align: center; width: 100%; padding: 60px 0;
    color: #444; font-size: 1.1rem;
  }
  .result-placeholder .big-icon { font-size: 4rem; display: block; margin-bottom: 15px; }

  /* Anime card */
  .anime-card {
    width: 190px;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 16px;
    overflow: hidden;
    animation: cardPop 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
    opacity: 0;
    transition: transform 0.3s, box-shadow 0.3s;
    cursor: default;
  }
  .anime-card:hover {
    transform: translateY(-8px);
    box-shadow: 0 12px 40px rgba(245, 87, 108, 0.3);
  }
  @keyframes cardPop {
    0% { opacity: 0; transform: scale(0.3) rotateY(90deg); }
    60% { transform: scale(1.05) rotateY(-5deg); }
    100% { opacity: 1; transform: scale(1) rotateY(0); }
  }

  .card-cover {
    width: 100%; height: 260px;
    background: linear-gradient(135deg, #1a1a2e, #16213e);
    position: relative; overflow: hidden;
  }
  .card-cover img {
    width: 100%; height: 100%; object-fit: cover;
    transition: transform 0.4s;
  }
  .anime-card:hover .card-cover img { transform: scale(1.08); }
  .card-cover .status-badge {
    position: absolute; top: 8px; right: 8px;
    padding: 2px 10px; border-radius: 10px;
    font-size: 0.7rem; font-weight: 600;
    backdrop-filter: blur(8px);
  }
  .status-badge.s-完结 { background: rgba(76, 175, 80, 0.8); }
  .status-badge.s-连载 { background: rgba(245, 87, 108, 0.8); }
  .status-badge.s-未播放 { background: rgba(79, 172, 254, 0.8); }
  .status-badge.s-未知 { background: rgba(150, 150, 150, 0.8); }

  .card-info { padding: 12px; }
  .card-title {
    font-size: 0.9rem; font-weight: 600; line-height: 1.3;
    display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
    overflow: hidden; min-height: 2.4em;
  }
  .card-date { font-size: 0.75rem; color: #666; margin-top: 6px; }
  .card-id {
    font-size: 0.65rem; color: #444; margin-top: 2px;
  }
  .card-id a { color: #4facfe; text-decoration: none; }
  .card-id a:hover { text-decoration: underline; }

  /* Single card - bigger */
  .anime-card.single {
    width: 280px;
  }
  .anime-card.single .card-cover { height: 380px; }
  .anime-card.single .card-title { font-size: 1.1rem; }

  /* Rolling animation overlay */
  .rolling-overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    z-index: 100; display: none;
    background: rgba(0,0,0,0.85);
    backdrop-filter: blur(10px);
    justify-content: center; align-items: center;
    flex-direction: column;
  }
  .rolling-overlay.active { display: flex; }
  .rolling-text {
    font-size: 2.5rem; font-weight: 900; color: #fff;
    text-align: center; padding: 0 20px;
    animation: pulse 0.15s ease infinite;
  }
  @keyframes pulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.02); }
  }
  .rolling-sub { color: #888; margin-top: 15px; font-size: 1rem; }

  /* History */
  .history-section {
    margin-top: 40px; border-top: 1px solid rgba(255,255,255,0.06);
    padding-top: 25px;
  }
  .history-section h3 { color: #666; font-size: 0.95rem; margin-bottom: 15px; }
  .history-items { display: flex; flex-wrap: wrap; gap: 8px; }
  .history-chip {
    padding: 4px 12px; border-radius: 12px;
    font-size: 0.75rem; color: #888;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.06);
  }

  /* Confetti */
  .confetti {
    position: fixed; z-index: 999; pointer-events: none;
    animation: confDrop linear forwards;
  }
  @keyframes confDrop {
    0% { transform: translateY(-10vh) rotate(0deg) scale(1); opacity: 1; }
    100% { transform: translateY(110vh) rotate(1080deg) scale(0.5); opacity: 0; }
  }

  @media (max-width: 600px) {
    .header h1 { font-size: 1.8rem; }
    .draw-btn { padding: 12px 30px; font-size: 1rem; }
    .anime-card { width: 160px; }
    .anime-card .card-cover { height: 220px; }
    .anime-card.single { width: 220px; }
    .anime-card.single .card-cover { height: 300px; }
  }
</style>
</head>
<body>

<div class="bg-stars" id="bgStars"></div>

<div class="rolling-overlay" id="rollingOverlay">
  <div class="rolling-text" id="rollingText">...</div>
  <div class="rolling-sub" id="rollingSub">抽取中...</div>
</div>

<div class="container">
  <div class="header">
    <h1>随机动漫抽取器</h1>
    <p class="sub">数据来源：番组百科 | 共收录 <span id="totalCount">0</span> 部动漫</p>
  </div>

  <div class="filters">
    <div class="filter-row">
      <div class="filter-label">地区</div>
      <div class="filter-options" id="filterRegion"></div>
    </div>
    <div class="filter-row">
      <div class="filter-label">版本</div>
      <div class="filter-options" id="filterFormat"></div>
    </div>
    <div class="filter-row">
      <div class="filter-label">状态</div>
      <div class="filter-options" id="filterStatus"></div>
    </div>
    <div class="filter-row">
      <div class="filter-label">年份</div>
      <div class="filter-options" id="filterYear"></div>
    </div>
    <div class="filter-row">
      <div class="filter-label">季度</div>
      <div class="filter-options" id="filterSeason"></div>
    </div>
    <div class="filter-summary">
      符合条件的动漫：<span id="filteredCount">0</span> 部
    </div>
  </div>

  <div class="actions">
    <button class="draw-btn btn-single" id="btnSingle" onclick="draw(1)">
      单抽
    </button>
    <button class="draw-btn btn-multi" id="btnMulti" onclick="draw(5)">
      五连抽
    </button>
  </div>

  <div class="results" id="results">
    <div class="result-placeholder">
      <span class="big-icon">🎰</span>
      选择筛选条件，然后点击抽取吧！
    </div>
  </div>

  <div class="history-section" id="historySection" style="display:none;">
    <h3>抽取历史</h3>
    <div class="history-items" id="historyItems"></div>
  </div>
</div>

<script src="anime_data.js"></script>
<script>
(function() {
  // State
  let filters = { region: '全部', format: '全部', status: '全部', yearRange: '全部', season: '全部' };
  let history = [];
  let isRolling = false;

  // Year range options
  const yearRanges = [
    { label: '全部', min: 0, max: 9999 },
    { label: '2020s', min: 2020, max: 2029 },
    { label: '2010s', min: 2010, max: 2019 },
    { label: '2000s', min: 2000, max: 2009 },
    { label: '90s', min: 1990, max: 1999 },
    { label: '80s', min: 1980, max: 1989 },
    { label: '更早', min: 0, max: 1979 },
  ];

  const statusOptions = ['全部', '完结', '连载', '未播放'];
  const regionOptions = ['全部', '日本', '中国'];
  const formatOptions = ['全部', 'TV', '剧场版', 'OVA', 'WEB', '短片', '动态漫画', '其他'];
  const seasonOptions = ['全部', '春', '夏', '秋', '冬'];

  // Init background stars
  function initStars() {
    const container = document.getElementById('bgStars');
    for (let i = 0; i < 80; i++) {
      const star = document.createElement('div');
      star.className = 'star';
      star.style.left = Math.random() * 100 + '%';
      star.style.top = Math.random() * 100 + '%';
      const size = Math.random() * 2 + 1;
      star.style.width = size + 'px';
      star.style.height = size + 'px';
      star.style.animationDuration = (Math.random() * 3 + 2) + 's';
      star.style.animationDelay = (Math.random() * 3) + 's';
      container.appendChild(star);
    }
  }

  // Build filter UI
  function makeFilterRow(elId, options, filterKey) {
    const el = document.getElementById(elId);
    options.forEach(opt => {
      const label = typeof opt === 'object' ? opt.label : opt;
      const tag = document.createElement('span');
      tag.className = 'filter-tag' + (label === '全部' ? ' active' : '');
      tag.textContent = label;
      tag.onclick = () => {
        el.querySelectorAll('.filter-tag').forEach(t => t.classList.remove('active'));
        tag.classList.add('active');
        filters[filterKey] = label;
        updateCount();
      };
      el.appendChild(tag);
    });
  }

  function buildFilters() {
    makeFilterRow('filterRegion', regionOptions, 'region');
    makeFilterRow('filterFormat', formatOptions, 'format');
    makeFilterRow('filterStatus', statusOptions, 'status');
    makeFilterRow('filterYear', yearRanges.map(y => y.label), 'yearRange');
    makeFilterRow('filterSeason', seasonOptions, 'season');
  }

  // Get filtered anime
  function getFiltered() {
    return animeDatabase.filter(a => {
      if (filters.region !== '全部') {
        if ((a.region || '') !== filters.region) return false;
      }
      if (filters.format !== '全部') {
        if ((a.format || '其他') !== filters.format) return false;
      }
      if (filters.status !== '全部') {
        if ((a.status || '未知') !== filters.status) return false;
      }
      if (filters.yearRange !== '全部') {
        const yr = yearRanges.find(y => y.label === filters.yearRange);
        if (yr && a.year) {
          if (a.year < yr.min || a.year > yr.max) return false;
        } else if (yr && !a.year) return false;
      }
      if (filters.season !== '全部') {
        if ((a.season || '') !== filters.season) return false;
      }
      return true;
    });
  }

  function updateCount() {
    const count = getFiltered().length;
    document.getElementById('filteredCount').textContent = count;
    document.getElementById('btnSingle').disabled = count === 0;
    document.getElementById('btnMulti').disabled = count < 1;
  }

  // Draw
  window.draw = function(count) {
    if (isRolling) return;
    const pool = getFiltered();
    if (pool.length === 0) return;

    isRolling = true;
    const overlay = document.getElementById('rollingOverlay');
    const rollingText = document.getElementById('rollingText');
    const rollingSub = document.getElementById('rollingSub');
    overlay.classList.add('active');
    rollingSub.textContent = count === 1 ? '单抽中...' : '五连抽中...';

    let tick = 0;
    const totalTicks = 25;
    const baseDelay = 40;

    function doTick() {
      const rand = pool[Math.floor(Math.random() * pool.length)];
      rollingText.textContent = rand.title;
      tick++;
      if (tick < totalTicks) {
        setTimeout(doTick, baseDelay + tick * tick * 1.5);
      } else {
        // Final selection
        setTimeout(() => {
          overlay.classList.remove('active');
          isRolling = false;

          const picked = [];
          const used = new Set();
          for (let i = 0; i < count; i++) {
            let tries = 0;
            let item;
            do {
              item = pool[Math.floor(Math.random() * pool.length)];
              tries++;
            } while (used.has(item.id) && tries < 100 && pool.length > count);
            used.add(item.id);
            picked.push(item);
          }

          showResults(picked, count === 1);
          picked.forEach(p => history.unshift(p.title));
          updateHistory();
          shootConfetti();
        }, 300);
      }
    }
    doTick();
  };

  // Show results
  function showResults(items, isSingle) {
    const container = document.getElementById('results');
    container.innerHTML = '';

    items.forEach((item, i) => {
      const card = document.createElement('div');
      card.className = 'anime-card' + (isSingle ? ' single' : '');
      card.style.animationDelay = (i * 0.12) + 's';

      const statusClass = 's-' + (item.status || '未知');
      const coverUrl = item.cover || '';
      const hasCover = coverUrl && coverUrl.startsWith('http');

      card.innerHTML = `
        <div class="card-cover">
          ${hasCover ? `<img src="${coverUrl}" alt="${item.title}" onerror="this.style.display='none'">` : ''}
          <span class="status-badge ${statusClass}">${item.status || '未知'}</span>
        </div>
        <div class="card-info">
          <div class="card-title">${item.title}</div>
          <div class="card-date">${item.date || '日期未知'}${item.format ? ' · ' + item.format : ''}${item.season ? ' · ' + item.season + '番' : ''}</div>
          <div class="card-id"><a href="https://www.anibk.com/bk/${item.id}/" target="_blank">查看详情 →</a></div>
        </div>
      `;
      container.appendChild(card);
    });
  }

  // History
  function updateHistory() {
    const section = document.getElementById('historySection');
    const container = document.getElementById('historyItems');
    if (history.length === 0) { section.style.display = 'none'; return; }
    section.style.display = 'block';
    container.innerHTML = history.slice(0, 30).map(h =>
      `<span class="history-chip">${h}</span>`
    ).join('');
  }

  // Confetti
  function shootConfetti() {
    const colors = ['#f5576c', '#f093fb', '#4facfe', '#00f2fe', '#ffd700', '#43e97b'];
    const shapes = ['circle', 'rect'];
    for (let i = 0; i < 50; i++) {
      const el = document.createElement('div');
      el.className = 'confetti';
      el.style.left = Math.random() * 100 + 'vw';
      el.style.width = (Math.random() * 10 + 5) + 'px';
      el.style.height = (Math.random() * 10 + 5) + 'px';
      el.style.background = colors[Math.floor(Math.random() * colors.length)];
      el.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
      el.style.animationDuration = (Math.random() * 2 + 1.5) + 's';
      el.style.animationDelay = (Math.random() * 0.6) + 's';
      document.body.appendChild(el);
      setTimeout(() => el.remove(), 4000);
    }
  }

  // Init
  initStars();
  buildFilters();
  document.getElementById('totalCount').textContent = animeDatabase.length;
  updateCount();
})();
</script>
</body>
</html>
