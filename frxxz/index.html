<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>凡人修仙传女性角色随机抽取器</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700;900&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Noto Sans SC', sans-serif; min-height: 100vh; background: #080c18; color: #fff; overflow-x: hidden; }
  .bg-stars { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 0;
    background: radial-gradient(ellipse at 30% 40%, rgba(100,200,255,0.12) 0%, transparent 50%),
                radial-gradient(ellipse at 70% 20%, rgba(200,150,255,0.1) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 80%, rgba(100,255,200,0.06) 0%, transparent 50%); }
  .star { position: absolute; border-radius: 50%; background: #fff; animation: twinkle ease-in-out infinite; }
  @keyframes twinkle { 0%,100%{opacity:.2;transform:scale(1)} 50%{opacity:1;transform:scale(1.5)} }
  .container { position: relative; z-index: 1; max-width: 1000px; margin: 0 auto; padding: 30px 20px; }
  .header { text-align: center; margin-bottom: 28px; }
  .header h1 { font-size: 2.5rem; font-weight: 900;
    background: linear-gradient(135deg, #64d8cb, #a78bfa, #38bdf8);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; background-size: 300% 300%;
    animation: gradShift 4s ease infinite; }
  @keyframes gradShift { 0%,100%{background-position:0% 50%} 50%{background-position:100% 50%} }
  .header .sub { color: #666; margin-top: 5px; font-size: 0.85rem; }
  .header .sub span { color: #64d8cb; font-weight: 700; }

  .filters { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.06); border-radius: 16px; padding: 18px; margin-bottom: 22px; }
  .filter-row { display: flex; align-items: flex-start; gap: 8px; margin-bottom: 8px; flex-wrap: wrap; }
  .filter-row:last-child { margin-bottom: 0; }
  .filter-label { font-size: 0.82rem; color: #888; min-width: 50px; padding-top: 5px; flex-shrink: 0; }
  .filter-options { display: flex; flex-wrap: wrap; gap: 5px; flex: 1; }
  .filter-tag { padding: 4px 12px; border-radius: 14px; font-size: 0.8rem; cursor: pointer;
    border: 1px solid rgba(255,255,255,0.1); background: rgba(255,255,255,0.03); color: #999; transition: all 0.25s; white-space: nowrap; }
  .filter-tag:hover { background: rgba(255,255,255,0.1); color: #fff; }
  .filter-tag.active { color: #fff; border-color: transparent; background: linear-gradient(135deg, #64d8cb, #a78bfa); }
  .filter-summary { text-align: center; padding: 6px 0 0; font-size: 0.82rem; color: #666; }
  .filter-summary span { color: #64d8cb; font-weight: 700; }

  .actions { display: flex; justify-content: center; gap: 20px; margin-bottom: 28px; flex-wrap: wrap; }
  .draw-btn { padding: 14px 45px; font-size: 1.15rem; font-weight: 700; border: none; border-radius: 50px; cursor: pointer;
    color: #fff; transition: all 0.3s; font-family: 'Noto Sans SC', sans-serif; position: relative; overflow: hidden; }
  .draw-btn::before { content:''; position:absolute; top:0; left:-100%; width:100%; height:100%;
    background: linear-gradient(90deg,transparent,rgba(255,255,255,0.2),transparent); transition: left 0.5s; }
  .draw-btn:hover::before { left: 100%; }
  .draw-btn:hover { transform: translateY(-3px); }
  .draw-btn:active { transform: translateY(0) scale(0.97); }
  .draw-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none !important; }
  .btn-single { background: linear-gradient(135deg, #64d8cb, #38bdf8); box-shadow: 0 8px 30px rgba(100,216,203,0.35); }
  .btn-multi { background: linear-gradient(135deg, #a78bfa, #818cf8); box-shadow: 0 8px 30px rgba(167,139,250,0.35); }

  .results { display: flex; flex-wrap: wrap; gap: 18px; justify-content: center; min-height: 200px; }
  .result-placeholder { text-align: center; width: 100%; padding: 60px 0; color: #444; font-size: 1rem; }
  .result-placeholder .big-icon { font-size: 4rem; display: block; margin-bottom: 12px; }

  .char-card { width: 200px; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08);
    border-radius: 16px; overflow: hidden; text-align: center; padding: 25px 14px;
    animation: cardPop 0.6s cubic-bezier(0.175,0.885,0.32,1.275) forwards;
    opacity: 0; transition: transform 0.3s, box-shadow 0.3s; cursor: default; }
  .char-card:hover { transform: translateY(-8px); box-shadow: 0 12px 35px rgba(100,216,203,0.3); }
  @keyframes cardPop { 0%{opacity:0;transform:scale(.3) rotateY(90deg)} 60%{transform:scale(1.05) rotateY(-5deg)} 100%{opacity:1;transform:scale(1) rotateY(0)} }

  .char-avatar { width: 85px; height: 85px; border-radius: 50%; margin: 0 auto 14px;
    display: flex; align-items: center; justify-content: center; font-size: 2.3rem;
    background: linear-gradient(135deg, rgba(100,216,203,0.2), rgba(167,139,250,0.2));
    border: 2px solid rgba(100,216,203,0.3); }
  .char-name { font-size: 1.15rem; font-weight: 700; margin-bottom: 8px; color: #64d8cb; }
  .char-desc { font-size: 0.7rem; color: #888; line-height: 1.4; margin-bottom: 8px; min-height: 2.8em; }
  .char-tags { display: flex; flex-wrap: wrap; gap: 4px; justify-content: center; }
  .char-tag { padding: 2px 8px; border-radius: 10px; font-size: 0.62rem; font-weight: 500;
    background: rgba(167,139,250,0.15); color: #a78bfa; border: 1px solid rgba(167,139,250,0.25); }

  .char-card.single { width: 260px; padding: 32px 18px; }
  .char-card.single .char-avatar { width: 105px; height: 105px; font-size: 2.8rem; }
  .char-card.single .char-name { font-size: 1.35rem; }

  .rolling-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    z-index: 100; display: none; background: rgba(0,0,0,0.85);
    backdrop-filter: blur(10px); justify-content: center; align-items: center; flex-direction: column; }
  .rolling-overlay.active { display: flex; }
  .rolling-text { font-size: 2.5rem; font-weight: 900; color: #64d8cb; text-align: center; padding: 0 20px; animation: pulse 0.15s ease infinite; }
  @keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.02)} }
  .rolling-sub { color: #888; margin-top: 15px; font-size: 1rem; }

  .history-section { margin-top: 35px; border-top: 1px solid rgba(255,255,255,0.06); padding-top: 20px; }
  .history-section h3 { color: #666; font-size: 0.9rem; margin-bottom: 12px; }
  .history-items { display: flex; flex-wrap: wrap; gap: 6px; }
  .history-chip { padding: 3px 10px; border-radius: 10px; font-size: 0.72rem; color: #888; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.06); }

  .confetti { position: fixed; z-index: 999; pointer-events: none; animation: confDrop linear forwards; }
  @keyframes confDrop { 0%{transform:translateY(-10vh) rotate(0) scale(1);opacity:1} 100%{transform:translateY(110vh) rotate(1080deg) scale(.5);opacity:0} }

  @media (max-width:600px) {
    .header h1 { font-size: 1.8rem; }
    .draw-btn { padding: 10px 28px; font-size: 1rem; }
    .char-card { width: 160px; padding: 18px 10px; }
    .char-card.single { width: 200px; }
  }
</style>
</head>
<body>

<div class="bg-stars" id="bgStars"></div>
<div class="rolling-overlay" id="rollingOverlay">
  <div class="rolling-text" id="rollingText">...</div>
  <div class="rolling-sub" id="rollingSub">抽取中...</div>
</div>

<div class="container">
  <div class="header">
    <h1>凡人修仙传女性角色抽取器</h1>
    <p class="sub">动画全篇章收录 | 共 <span id="totalCount">0</span> 位女性角色</p>
  </div>

  <div class="filters">
    <div class="filter-row"><div class="filter-label">篇章</div><div class="filter-options" id="fArc"></div></div>
    <div class="filter-summary">符合条件：<span id="filteredCount">0</span> 位角色</div>
  </div>

  <div class="actions">
    <button class="draw-btn btn-single" id="btnSingle" onclick="draw(1)">单抽</button>
    <button class="draw-btn btn-multi" id="btnMulti" onclick="draw(5)">五连抽</button>
  </div>

  <div class="results" id="results">
    <div class="result-placeholder"><span class="big-icon">&#9876;</span>选择筛选条件，然后点击抽取吧！</div>
  </div>

  <div class="history-section" id="historySection" style="display:none;">
    <h3>抽取历史</h3>
    <div class="history-items" id="historyItems"></div>
  </div>
</div>

<script>
const database = [
  // 风起天南篇
  { name: "墨彩环", desc: "墨居仁之女，韩立初恋，无灵根不能修仙，终身未嫁", arc: "风起天南" },
  { name: "严氏", desc: "墨大夫四夫人，墨彩环之母", arc: "风起天南" },
  { name: "燕如嫣", desc: "越国第一修仙世家燕家少主，水系天灵根", arc: "风起天南" },
  { name: "王婵", desc: "鬼灵门女修，燕家堡之战中逼韩立入绝境", arc: "风起天南" },
  { name: "陈巧倩", desc: "黄枫谷韩立师姐，温婉善良，对韩立有情", arc: "风起天南" },
  { name: "菡云芝", desc: "太南小会卖韩立金竺符笔的女修，血色试炼同行", arc: "风起天南" },
  { name: "萧翠儿", desc: "萧振孙女，木土双灵根，献兽皮书入黄枫谷", arc: "风起天南" },
  { name: "辛如音", desc: "擅长阵法之道的白衣女修，韩立阵法方面恩人", arc: "风起天南" },

  // 魔道争锋篇
  { name: "南宫婉", desc: "掩月宗结丹期女修，韩立唯一道侣，修炼素女轮回功", arc: "魔道争锋" },
  { name: "红拂仙子", desc: "黄枫谷元婴期强者，董萱儿师祖", arc: "魔道争锋" },
  { name: "董萱儿", desc: "黄枫谷弟子，红拂仙子弟子，泼辣大胆，后入合欢宗", arc: "魔道争锋" },

  // 再别天南篇
  { name: "公孙杏", desc: "韩立离开天南前赠予宝物的女修", arc: "再别天南" },

  // 星海飞驰篇
  { name: "元瑶", desc: "魁星岛附近小门派女修，容貌绝美，韩立红颜知己", arc: "星海飞驰" },
  { name: "妍丽", desc: "元瑶闺蜜，身材娇小圆脸甜美，额戴金环", arc: "星海飞驰" },
  { name: "紫灵", desc: "妙音门门主之女，人界第一美女，韩立重要红颜", arc: "星海飞驰" },
  { name: "文思月", desc: "文樯之女，妙音门女修，二十余年筑基成功", arc: "星海飞驰" },
  { name: "范静梅", desc: "妙音门范夫人，有情有义", arc: "星海飞驰" },
  { name: "凌玉灵", desc: "星宫双圣之女，性格干练沉稳，身材高挑", arc: "星海飞驰" },

  // 外海风云/重返天南篇
  { name: "银月", desc: "银月狼族圣女，韩立法宝器灵，陪伴韩立最久的女性", arc: "外海风云" },
  { name: "梅凝", desc: "粗布麻衣双马尾素颜美女，与紫灵一同出场", arc: "外海风云" },
  { name: "慕沛灵", desc: "落云宗筑基期女修，负责管理药园", arc: "重返天南" },
  { name: "柳玉", desc: "出身御灵宗，被韩立生擒后收为记名弟子，改名柳眉", arc: "重返天南" },
];

(function() {
  let filters = { arc: '全部' };
  let history = [];
  let isRolling = false;

  const arcOpts = ['全部', '风起天南', '魔道争锋', '再别天南', '星海飞驰', '外海风云', '重返天南'];
  const emojis = ['&#9876;','&#127800;','&#10024;','&#128142;','&#127774;','&#9733;','&#128171;','&#127775;'];

  const sc = document.getElementById('bgStars');
  for (let i = 0; i < 80; i++) {
    const s = document.createElement('div'); s.className = 'star';
    s.style.left = Math.random()*100+'%'; s.style.top = Math.random()*100+'%';
    const sz = Math.random()*2+1; s.style.width=sz+'px'; s.style.height=sz+'px';
    s.style.animationDuration = (Math.random()*3+2)+'s'; s.style.animationDelay = (Math.random()*3)+'s';
    sc.appendChild(s);
  }

  function makeRow(id, opts, key) {
    const el = document.getElementById(id);
    opts.forEach(opt => {
      const t = document.createElement('span');
      t.className = 'filter-tag' + (opt==='全部'?' active':'');
      t.textContent = opt;
      t.onclick = () => {
        el.querySelectorAll('.filter-tag').forEach(x => x.classList.remove('active'));
        t.classList.add('active'); filters[key] = opt; updateCount();
      };
      el.appendChild(t);
    });
  }
  makeRow('fArc', arcOpts, 'arc');

  function getFiltered() {
    return database.filter(c => filters.arc === '全部' || c.arc === filters.arc);
  }

  function updateCount() {
    const n = getFiltered().length;
    document.getElementById('filteredCount').textContent = n;
    document.getElementById('btnSingle').disabled = n === 0;
    document.getElementById('btnMulti').disabled = n < 1;
  }

  window.draw = function(count) {
    if (isRolling) return;
    const pool = getFiltered(); if (!pool.length) return;
    isRolling = true;
    const ov = document.getElementById('rollingOverlay');
    const rt = document.getElementById('rollingText');
    document.getElementById('rollingSub').textContent = count===1?'单抽中...':'五连抽中...';
    ov.classList.add('active');
    let tick = 0;
    function doTick() {
      rt.textContent = pool[Math.floor(Math.random()*pool.length)].name;
      tick++;
      if (tick < 25) setTimeout(doTick, 40 + tick*tick*1.5);
      else setTimeout(() => {
        ov.classList.remove('active'); isRolling = false;
        const picked = [], used = new Set();
        for (let i = 0; i < count; i++) {
          let t = 0, item;
          do { item = pool[Math.floor(Math.random()*pool.length)]; t++; }
          while (used.has(item.name) && t < 100 && pool.length > count);
          used.add(item.name); picked.push(item);
        }
        showResults(picked, count===1);
        picked.forEach(p => history.unshift(p.name));
        updateHistory(); shootConfetti();
      }, 300);
    }
    doTick();
  };

  function showResults(items, single) {
    const c = document.getElementById('results'); c.innerHTML = '';
    items.forEach((item, i) => {
      const card = document.createElement('div');
      card.className = 'char-card' + (single?' single':'');
      card.style.animationDelay = (i*0.12)+'s';
      card.innerHTML = `
        <div class="char-avatar">${emojis[Math.floor(Math.random()*emojis.length)]}</div>
        <div class="char-name">${item.name}</div>
        <div class="char-desc">${item.desc}</div>
        <div class="char-tags"><span class="char-tag">${item.arc}</span></div>
      `;
      c.appendChild(card);
    });
  }

  function updateHistory() {
    const s = document.getElementById('historySection');
    const c = document.getElementById('historyItems');
    if (!history.length) { s.style.display='none'; return; }
    s.style.display='block';
    c.innerHTML = history.slice(0,30).map(h => `<span class="history-chip">${h}</span>`).join('');
  }

  function shootConfetti() {
    const colors = ['#64d8cb','#a78bfa','#38bdf8','#818cf8','#34d399','#fbbf24'];
    for (let i = 0; i < 50; i++) {
      const el = document.createElement('div'); el.className = 'confetti';
      el.style.left = Math.random()*100+'vw';
      el.style.width = (Math.random()*10+5)+'px'; el.style.height = (Math.random()*10+5)+'px';
      el.style.background = colors[Math.floor(Math.random()*colors.length)];
      el.style.borderRadius = Math.random()>.5?'50%':'2px';
      el.style.animationDuration = (Math.random()*2+1.5)+'s';
      el.style.animationDelay = (Math.random()*.6)+'s';
      document.body.appendChild(el); setTimeout(() => el.remove(), 4000);
    }
  }

  document.getElementById('totalCount').textContent = database.length;
  updateCount();
})();
</script>
</body>
</html>
