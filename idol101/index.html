    background: #0c0818;
    color: #fff;

  }

                radial-gradient(ellipse at 70% 20%, rgba(100, 200, 255, 0.12) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 80%, rgba(255, 200, 100, 0.08) 0%, transparent 50%);
  }
  .star { position: absolute; border-radius: 50%; background: #fff; animation: twinkle ease-in-out infinite; }
  @keyframes twinkle { 0%,100%{opacity:.2;transform:scale(1)} 50%{opacity:1;transform:scale(1.5)} }

  .container { position: relative; z-index: 1; max-width: 1100px; margin: 0 auto; padding: 25px 20px; }

  .header { text-align: center; margin-bottom: 25px; }
  .header h1 {
    font-size: 2.4rem; font-weight: 900;
    background: linear-gradient(135deg, #ff6ec4, #7873f5, #4adede);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text; background-size: 300% 300%;
    animation: gradShift 4s ease infinite;
  }
  @keyframes gradShift { 0%,100%{background-position:0% 50%} 50%{background-position:100% 50%} }
  .header .sub { color: #666; margin-top: 5px; font-size: 0.85rem; }
  .header .sub span { color: #ff6ec4; font-weight: 700; }

  .filters {
    background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.06);
    border-radius: 16px; padding: 18px; margin-bottom: 20px;
  }
  .filter-row { display: flex; align-items: flex-start; gap: 8px; margin-bottom: 8px; flex-wrap: wrap; }
  .filter-row:last-child { margin-bottom: 0; }
  .filter-label { font-size: 0.82rem; color: #888; min-width: 50px; padding-top: 5px; flex-shrink: 0; }
  .filter-options { display: flex; flex-wrap: wrap; gap: 5px; flex: 1; }
  .filter-tag {
    padding: 4px 12px; border-radius: 14px; font-size: 0.8rem; cursor: pointer;
    border: 1px solid rgba(255,255,255,0.1); background: rgba(255,255,255,0.03);
    color: #999; transition: all 0.25s; white-space: nowrap;
  }
  .filter-tag:hover { background: rgba(255,255,255,0.1); color: #fff; }
  .filter-tag.active { color: #fff; border-color: transparent; }
  .filter-tag.active.f-show { background: linear-gradient(135deg, #ff6ec4, #7873f5); }
  .filter-tag.active.f-debut { background: linear-gradient(135deg, #4adede, #00b4d8); }
  .filter-summary { text-align: center; padding: 6px 0 0; font-size: 0.82rem; color: #666; }
  .filter-summary span { color: #ff6ec4; font-weight: 700; }

  .actions { display: flex; justify-content: center; gap: 20px; margin-bottom: 25px; flex-wrap: wrap; }
  .draw-btn {
    padding: 14px 45px; font-size: 1.15rem; font-weight: 700;
    border: none; border-radius: 50px; cursor: pointer;
    color: #fff; transition: all 0.3s; font-family: 'Noto Sans SC', sans-serif;
    position: relative; overflow: hidden;
  }
  .draw-btn::before {
    content:''; position:absolute; top:0; left:-100%; width:100%; height:100%;
    background: linear-gradient(90deg,transparent,rgba(255,255,255,0.2),transparent);
    transition: left 0.5s;
  }
  .draw-btn:hover::before { left: 100%; }
  .draw-btn:hover { transform: translateY(-3px); }
  .draw-btn:active { transform: translateY(0) scale(0.97); }
  .draw-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none !important; }
  .btn-single { background: linear-gradient(135deg, #ff6ec4, #7873f5); box-shadow: 0 8px 30px rgba(255,110,196,0.35); }
  .btn-multi { background: linear-gradient(135deg, #4adede, #00b4d8); box-shadow: 0 8px 30px rgba(74,222,222,0.35); }

  .results { display: flex; flex-wrap: wrap; gap: 16px; justify-content: center; min-height: 200px; }
  .result-placeholder { text-align: center; width: 100%; padding: 50px 0; color: #444; font-size: 1rem; }
  .result-placeholder .big-icon { font-size: 3.5rem; display: block; margin-bottom: 12px; }

  .person-card {
    width: 180px; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08);
    border-radius: 16px; overflow: hidden; text-align: center; padding: 22px 12px;
    animation: cardPop 0.6s cubic-bezier(0.175,0.885,0.32,1.275) forwards;
    opacity: 0; transition: transform 0.3s, box-shadow 0.3s; cursor: default;
  }
  .person-card:hover { transform: translateY(-8px); box-shadow: 0 12px 35px rgba(255,110,196,0.3); }
  @keyframes cardPop { 0%{opacity:0;transform:scale(.3) rotateY(90deg)} 60%{transform:scale(1.05) rotateY(-5deg)} 100%{opacity:1;transform:scale(1) rotateY(0)} }

  .person-avatar {
    width: 80px; height: 80px; border-radius: 50%; margin: 0 auto 12px;
    display: flex; align-items: center; justify-content: center; font-size: 2rem;
    border: 2px solid rgba(255,110,196,0.3);
  }
  .av-c101 { background: linear-gradient(135deg, rgba(255,110,196,0.2), rgba(255,80,80,0.2)); }
  .av-qcny2 { background: linear-gradient(135deg, rgba(120,115,245,0.2), rgba(74,222,222,0.2)); }
  .av-ccy2020 { background: linear-gradient(135deg, rgba(255,200,100,0.2), rgba(255,110,196,0.2)); }

  .person-name { font-size: 1.1rem; font-weight: 700; margin-bottom: 8px; color: #fff; }
  .person-tags { display: flex; flex-wrap: wrap; gap: 4px; justify-content: center; }
  .person-tag { padding: 2px 8px; border-radius: 10px; font-size: 0.65rem; font-weight: 500; }
  .tag-show-c101 { background: rgba(255,110,196,0.15); color: #ff6ec4; border: 1px solid rgba(255,110,196,0.25); }
  .tag-show-qcny2 { background: rgba(120,115,245,0.15); color: #7873f5; border: 1px solid rgba(120,115,245,0.25); }
  .tag-show-ccy2020 { background: rgba(255,200,100,0.15); color: #ffc864; border: 1px solid rgba(255,200,100,0.25); }
  .tag-debut { background: rgba(74,222,222,0.2); color: #4adede; border: 1px solid rgba(74,222,222,0.3); }

  .person-card.single { width: 240px; padding: 30px 18px; }
  .person-card.single .person-avatar { width: 100px; height: 100px; font-size: 2.5rem; }
  .person-card.single .person-name { font-size: 1.35rem; }

  .rolling-overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    z-index: 100; display: none; background: rgba(0,0,0,0.85);
    backdrop-filter: blur(10px); justify-content: center; align-items: center; flex-direction: column;
  }
  .rolling-overlay.active { display: flex; }
  .rolling-text { font-size: 2.5rem; font-weight: 900; color: #ff6ec4; text-align: center; padding: 0 20px; animation: pulse 0.15s ease infinite; }
  @keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.02)} }
  .rolling-sub { color: #888; margin-top: 15px; font-size: 1rem; }

  .history-section { margin-top: 35px; border-top: 1px solid rgba(255,255,255,0.06); padding-top: 20px; }
  .history-section h3 { color: #666; font-size: 0.9rem; margin-bottom: 12px; }
  .history-items { display: flex; flex-wrap: wrap; gap: 6px; }
  .history-chip { padding: 3px 10px; border-radius: 10px; font-size: 0.72rem; color: #888; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.06); }

  .confetti { position: fixed; z-index: 999; pointer-events: none; animation: confDrop linear forwards; }
  @keyframes confDrop { 0%{transform:translateY(-10vh) rotate(0) scale(1);opacity:1} 100%{transform:translateY(110vh) rotate(1080deg) scale(.5);opacity:0} }

  @media (max-width:600px) {
    .header h1 { font-size: 1.7rem; }
    .draw-btn { padding: 10px 28px; font-size: 1rem; }
    .person-card { width: 150px; padding: 16px 8px; }
    .person-card.single { width: 190px; }
  }
</style>

const database = rawData.map(([name, show, debut]) => ({ name, show, debut }));

(function() {
  let filters = { show: '全部', debut: '全部' };
  let history = [];
  let isRolling = false;

  const showOpts = ['全部', '创造101', '青春有你2', '创造营2020'];
  const debutOpts = ['全部', '已出道', '未出道'];

  const showTag = {'创造101':'tag-show-c101','青春有你2':'tag-show-qcny2','创造营2020':'tag-show-ccy2020'};
  const showAvatar = {'创造101':'av-c101','青春有你2':'av-qcny2','创造营2020':'av-ccy2020'};
  const showGroup = {'创造101':'火箭少女101','青春有你2':'THE9','创造营2020':'硬糖少女303'};
  const emojis = ['&#127775;','&#128171;','&#127800;','&#10024;','&#127942;','&#128142;','&#127774;','&#9733;'];

  const sc = document.getElementById('bgStars');
  for (let i = 0; i < 80; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    s.style.left = Math.random()*100+'%'; s.style.top = Math.random()*100+'%';
    const sz = Math.random()*2+1; s.style.width=sz+'px'; s.style.height=sz+'px';
    s.style.animationDuration = (Math.random()*3+2)+'s'; s.style.animationDelay = (Math.random()*3)+'s';
    sc.appendChild(s);
  }

  function makeRow(id, opts, key, cls) {
    const el = document.getElementById(id);
    opts.forEach(opt => {
      const t = document.createElement('span');
      t.className = 'filter-tag ' + cls + (opt==='全部'?' active':'');
      t.textContent = opt;
      t.onclick = () => {
        el.querySelectorAll('.filter-tag').forEach(x => x.classList.remove('active'));
        t.classList.add('active');
        filters[key] = opt;
        updateCount();
      };
      el.appendChild(t);
    });
  }

  makeRow('fShow', showOpts, 'show', 'f-show');
  makeRow('fDebut', debutOpts, 'debut', 'f-debut');

  function getFiltered() {
    return database.filter(c => {
      if (filters.show !== '全部' && c.show !== filters.show) return false;
      if (filters.debut !== '全部') {
        if (filters.debut === '已出道' && !c.debut) return false;
        if (filters.debut === '未出道' && c.debut) return false;
      }
      return true;
    });
  }

  function updateCount() {
    const n = getFiltered().length;
    document.getElementById('filteredCount').textContent = n;
    document.getElementById('btnSingle').disabled = n === 0;
    document.getElementById('btnMulti').disabled = n < 1;
  }

  window.draw = function(count) {
    if (isRolling) return;
    const pool = getFiltered();
    if (!pool.length) return;
    isRolling = true;
    const ov = document.getElementById('rollingOverlay');
    const rt = document.getElementById('rollingText');
    document.getElementById('rollingSub').textContent = count===1?'单抽中...':'五连抽中...';
    ov.classList.add('active');
    let tick = 0, total = 25;
    function doTick() {
      rt.textContent = pool[Math.floor(Math.random()*pool.length)].name;
      tick++;
      if (tick < total) setTimeout(doTick, 40 + tick*tick*1.5);
      else setTimeout(() => {
        ov.classList.remove('active');
        isRolling = false;
        const picked = [], used = new Set();
        for (let i = 0; i < count; i++) {
          let t = 0, item;
          do { item = pool[Math.floor(Math.random()*pool.length)]; t++; }
          while (used.has(item.name) && t < 100 && pool.length > count);
          used.add(item.name); picked.push(item);
        }
        showResults(picked, count===1);
        picked.forEach(p => history.unshift(p.name));
        updateHistory(); shootConfetti();
      }, 300);
    }
    doTick();
  };

  function showResults(items, single) {
    const c = document.getElementById('results');
    c.innerHTML = '';
    items.forEach((item, i) => {
      const card = document.createElement('div');
      card.className = 'person-card' + (single?' single':'');
      card.style.animationDelay = (i*0.12)+'s';
      const emoji = emojis[Math.floor(Math.random()*emojis.length)];
      const avClass = showAvatar[item.show] || '';
      const tagClass = showTag[item.show] || '';

      card.innerHTML = `
        <div class="person-avatar ${avClass}">${emoji}</div>
        <div class="person-name">${item.name}</div>
        <div class="person-tags">
          <span class="person-tag ${tagClass}">${item.show}</span>
          ${item.debut ? `<span class="person-tag tag-debut">${showGroup[item.show]}</span>` : ''}
        </div>
      `;
      c.appendChild(card);
    });
  }

  function updateHistory() {
    const s = document.getElementById('historySection');
    const c = document.getElementById('historyItems');
    if (!history.length) { s.style.display='none'; return; }
    s.style.display='block';
    c.innerHTML = history.slice(0,30).map(h => `<span class="history-chip">${h}</span>`).join('');
  }

  function shootConfetti() {
    const colors = ['#ff6ec4','#7873f5','#4adede','#ffd740','#ff5252','#69f0ae'];
    for (let i = 0; i < 50; i++) {
      const el = document.createElement('div');
      el.className = 'confetti';
      el.style.left = Math.random()*100+'vw';
      el.style.width = (Math.random()*10+5)+'px'; el.style.height = (Math.random()*10+5)+'px';
      el.style.background = colors[Math.floor(Math.random()*colors.length)];
      el.style.borderRadius = Math.random()>.5?'50%':'2px';
      el.style.animationDuration = (Math.random()*2+1.5)+'s';
      el.style.animationDelay = (Math.random()*.6)+'s';
      document.body.appendChild(el);
      setTimeout(() => el.remove(), 4000);
    }
  }

  document.getElementById('totalCount').textContent = database.length;
  updateCount();
})();
