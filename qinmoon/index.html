<meta charset="UTF-8">

<title>秦时明月角色随机抽取器</title>
<style>

  .header { text-align: center; margin-bottom: 22px; }

    background: linear-gradient(135deg, #d4a853, #c0392b, #8e44ad);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; background-size: 300% 300%;
    animation: gradShift 4s ease infinite; }
  @keyframes gradShift { 0%,100%{background-position:0% 50%} 50%{background-position:100% 50%} }
  .header .sub { color: #666; margin-top: 5px; font-size: 0.82rem; }

  .filter-row { display: flex; align-items: flex-start; gap: 8px; margin-bottom: 6px; flex-wrap: wrap; }
  .filter-row:last-child { margin-bottom: 0; }
  .filter-label { font-size: 0.78rem; color: #888; min-width: 50px; padding-top: 5px; flex-shrink: 0; }
  .filter-options { display: flex; flex-wrap: wrap; gap: 4px; flex: 1; }
  .filter-tag { padding: 3px 10px; border-radius: 12px; font-size: 0.72rem; cursor: pointer;
    border: 1px solid rgba(255,255,255,0.1); background: rgba(255,255,255,0.03); color: #999; transition: all 0.25s; white-space: nowrap; }
  .filter-tag:hover { background: rgba(255,255,255,0.1); color: #fff; }
  .filter-tag.active { color: #fff; border-color: transparent; background: linear-gradient(135deg, #d4a853, #c0392b); }
  .filter-summary { text-align: center; padding: 5px 0 0; font-size: 0.78rem; color: #666; }
  .filter-summary span { color: #d4a853; font-weight: 700; }
  .actions { display: flex; justify-content: center; gap: 20px; margin-bottom: 22px; flex-wrap: wrap; }
  .draw-btn { padding: 13px 42px; font-size: 1.1rem; font-weight: 700; border: none; border-radius: 50px; cursor: pointer;
    color: #fff; transition: all 0.3s; font-family: 'Noto Sans SC', sans-serif; position: relative; overflow: hidden; }
  .draw-btn::before { content:''; position:absolute; top:0; left:-100%; width:100%; height:100%;
    background: linear-gradient(90deg,transparent,rgba(255,255,255,0.2),transparent); transition: left 0.5s; }
  .draw-btn:hover::before { left: 100%; }
  .draw-btn:hover { transform: translateY(-3px); }
  .draw-btn:active { transform: translateY(0) scale(0.97); }
  .draw-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none !important; }
  .btn-single { background: linear-gradient(135deg, #d4a853, #b8860b); box-shadow: 0 8px 28px rgba(212,168,83,0.35); }
  .btn-multi { background: linear-gradient(135deg, #c0392b, #8e44ad); box-shadow: 0 8px 28px rgba(192,57,43,0.35); }
  .results { display: flex; flex-wrap: wrap; gap: 14px; justify-content: center; min-height: 180px; }
  .result-placeholder { text-align: center; width: 100%; padding: 50px 0; color: #444; font-size: 1rem; }
  .result-placeholder .big-icon { font-size: 3.5rem; display: block; margin-bottom: 10px; }
  .char-card { width: 185px; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08);
    border-radius: 14px; text-align: center; padding: 20px 12px;

  @keyframes cardPop { 0%{opacity:0;transform:scale(.3) rotateY(90deg)} 60%{transform:scale(1.05) rotateY(-5deg)} 100%{opacity:1;transform:scale(1) rotateY(0)} }

  .char-name { font-size: 1.05rem; font-weight: 700; margin-bottom: 6px; color: #d4a853; }
  .char-desc { font-size: 0.65rem; color: #888; line-height: 1.35; margin-bottom: 6px; min-height: 2.7em;

    background: rgba(192,57,43,0.15); color: #e74c3c; border: 1px solid rgba(192,57,43,0.25); }
  .char-card.single { width: 240px; padding: 28px 16px; }
  .char-card.single .char-avatar { width: 95px; height: 95px; font-size: 2.5rem; }
  .char-card.single .char-name { font-size: 1.3rem; }
  .rolling-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    z-index: 100; display: none; background: rgba(0,0,0,0.85);
    backdrop-filter: blur(10px); justify-content: center; align-items: center; flex-direction: column; }
  .rolling-overlay.active { display: flex; }
  .rolling-text { font-size: 2.5rem; font-weight: 900; color: #d4a853; text-align: center; padding: 0 20px; animation: pulse 0.15s ease infinite; }

  .rolling-sub { color: #888; margin-top: 15px; font-size: 1rem; }
  .history-section { margin-top: 30px; border-top: 1px solid rgba(255,255,255,0.06); padding-top: 18px; }
  .history-section h3 { color: #666; font-size: 0.85rem; margin-bottom: 10px; }
  .history-items { display: flex; flex-wrap: wrap; gap: 5px; }
  .history-chip { padding: 3px 9px; border-radius: 10px; font-size: 0.68rem; color: #888; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.06); }

    .draw-btn { padding: 10px 26px; font-size: 0.95rem; }
    .char-card { width: 150px; padding: 14px 8px; }

<div class="bg-stars" id="bgStars"></div>
<div class="rolling-overlay" id="rollingOverlay">

    sc.appendChild(s);
  }

  const el = document.getElementById('fFaction');
  factionOpts.forEach(opt => {
    const t = document.createElement('span');
    t.className = 'filter-tag' + (opt==='全部'?' active':'');
    t.textContent = opt;
    t.onclick = () => {
      el.querySelectorAll('.filter-tag').forEach(x => x.classList.remove('active'));
      t.classList.add('active'); filters.faction = opt; updateCount();
    };
    el.appendChild(t);
  });

  function getFiltered() {
    return database.filter(c => filters.faction === '全部' || c.faction === filters.faction);
  }

  function updateCount() {
    const n = getFiltered().length;
    document.getElementById('filteredCount').textContent = n;
    document.getElementById('btnSingle').disabled = n === 0;
    document.getElementById('btnMulti').disabled = n < 1;
  }

  window.draw = function(count) {
    if (isRolling) return;
    const pool = getFiltered(); if (!pool.length) return;
    isRolling = true;
    const ov = document.getElementById('rollingOverlay');
    const rt = document.getElementById('rollingText');
    document.getElementById('rollingSub').textContent = count===1?'单抽中...':'五连抽中...';
    ov.classList.add('active');
    let tick = 0;
    function doTick() {
      rt.textContent = pool[Math.floor(Math.random()*pool.length)].name;
      tick++;
      if (tick < 25) setTimeout(doTick, 40 + tick*tick*1.5);
      else setTimeout(() => {
        ov.classList.remove('active'); isRolling = false;
        const picked = [], used = new Set();
        for (let i = 0; i < count; i++) {
          let t = 0, item;
          do { item = pool[Math.floor(Math.random()*pool.length)]; t++; }
          while (used.has(item.name) && t < 100 && pool.length > count);
          used.add(item.name); picked.push(item);
        }
        showResults(picked, count===1);
        picked.forEach(p => history.unshift(p.name));
        updateHistory(); shootConfetti();
      }, 300);
    }
    doTick();
  };

  function showResults(items, single) {
    const c = document.getElementById('results'); c.innerHTML = '';
    items.forEach((item, i) => {
      const card = document.createElement('div');
      card.className = 'char-card' + (single?' single':'');
      card.style.animationDelay = (i*0.12)+'s';
      card.innerHTML = `
        <div class="char-avatar">${emojis[Math.floor(Math.random()*emojis.length)]}</div>
        <div class="char-name">${item.name}</div>
        <div class="char-desc">${item.desc}</div>
        <div class="char-tags"><span class="char-tag">${item.faction}</span></div>
      `;
      c.appendChild(card);
    });
  }

  function updateHistory() {
    const s = document.getElementById('historySection');
    const c = document.getElementById('historyItems');
    if (!history.length) { s.style.display='none'; return; }
    s.style.display='block';
    c.innerHTML = history.slice(0,30).map(h => `<span class="history-chip">${h}</span>`).join('');
  }

  function shootConfetti() {
    const colors = ['#d4a853','#c0392b','#8e44ad','#e74c3c','#f1c40f','#2ecc71'];
    for (let i = 0; i < 50; i++) {
      const el = document.createElement('div'); el.className = 'confetti';
      el.style.left = Math.random()*100+'vw';
      el.style.width = (Math.random()*10+5)+'px'; el.style.height = (Math.random()*10+5)+'px';
      el.style.background = colors[Math.floor(Math.random()*colors.length)];
      el.style.borderRadius = Math.random()>.5?'50%':'2px';
      el.style.animationDuration = (Math.random()*2+1.5)+'s';
      el.style.animationDelay = (Math.random()*.6)+'s';
      document.body.appendChild(el); setTimeout(() => el.remove(), 4000);
    }
  }

  document.getElementById('totalCount').textContent = database.length;
  updateCount();
})();
</script>
</body>
</html>
